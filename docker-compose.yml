services:
  opencode:
    image: ghcr.io/realsjpeng/opencode-academic-enhanced:latest
    container_name: opencode-academic-enhanced
    restart: unless-stopped
    ports:
      - "${PORT:-4096}:4096"
    volumes:
      - "${DATA_DIR:-./data}:/home/user/.local/share/opencode"
      - "${WORKSPACE:-.}:/workspace"
